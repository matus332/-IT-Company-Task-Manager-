{% extends "base.html" %}

{% block content %}
  <div class="alert alert-danger">
    <h4>Confirm delete</h4>
    <p>Are you sure you want to delete this object?</p>
  </div>

  <form method="post">
    {% csrf_token %}

    <button type="submit" class="btn btn-danger">
      Yes, delete
    </button>

    <a href="{{ request.META.HTTP_REFERER }}" class="btn btn-secondary">
      Cancel
    </a>
  </form>
{% endblock %}
