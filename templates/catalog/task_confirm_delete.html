{% extends "base.html" %}

{% block content %}
  <h1>Delete task</h1>
  <form action="" method="post">
    {% csrf_token %}
    <p>Are you sure you want to delete this task?</p>

    <button type="submit" class="btn btn-primary">Yes, delete</button>

    <a href="{% url 'catalog:task-list' %}" class="btn btn-secondary">
      Cancel
    </a>
  </form>
{% endblock %}
