{% extends "base.html" %}

{% block content %}
  <h1>Task Types</h1>

  {% if task_types %}
    <ul>
      {% for task in task_types %}
        <li><a href="{% url 'catalog:task-type-detail' pk=task.id %}">ID:{{ task.id }} "{{ task.name }}"</a></li>
      {% endfor %}
    </ul>
   {% else %}
    <div class="alert alert-info">
      No task types found.
    </div>
  {% endif %}
{% endblock %}
