{% extends "base.html" %}

{% block content %}
  <h1>Task Types</h1>

  {% if task_types %}
    <ul>
      {% for task in task_types %}
        <li>ID:{{ task.id }} "{{ task.name }} "</li>
      {% endfor %}
    </ul>
   {% else %}
    <div class="alert alert-info">
      No task types found.
    </div>
  {% endif %}
{% endblock %}
