{% extends "base.html" %}

{% block content %}
  <div class="alert alert-danger">
    <h4>Warning</h4>
    <p class="mb-0">This action cannot be undone.</p>
  </div>

  <form method="post">
    {% csrf_token %}

    <button type="submit" class="btn btn-danger">
      Yes, delete
    </button>

    <a href="{% url 'catalog:worker-list' %}" class="btn btn-secondary">
      Cancel
    </a>
  </form>
{% endblock %}
