{% extends "base.html" %}

{% block content %}
  <h1>Delete worker</h1>
  
  <form action="" method="post">
    {% csrf_token %}
    <p>Are you sure you want delete this worker?</p>
  
    <button type="submit" class="btn btn-primary">Yes, delete</button>
  
    <a href="{% url 'catalog:worker-list' %}" class="btn btn-secondary">
      Cancel
    </a>
  </form>
{% endblock %}
