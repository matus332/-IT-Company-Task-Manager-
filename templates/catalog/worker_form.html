{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <div class="page-header">
    <h1>
      {% if object %}
        Update
      {% else %}
        Create
      {% endif %}
    </h1>
  </div>

  <form method="post" novalidate>
    {% csrf_token %}

    {{ form|crispy }}

    <button type="submit" class="btn btn-primary">
      Save
    </button>

    <a href="{{ request.META.HTTP_REFERER }}" class="btn btn-secondary">
      Cancel
    </a>
  </form>
{% endblock %}
