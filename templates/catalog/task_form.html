{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <h1>Create Task</h1>
  
  <form action="" method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    <input type="submit" value="Create" class="btn btn-primary">
    <a href="{% url 'catalog:task-list' %}">Cancel</a>
  </form>
{% endblock %}
