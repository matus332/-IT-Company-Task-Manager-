{% extends "base.html" %}

{% block content %}
  <div class="page-header">
    <h1>Positions</h1>
    <a href="{% url 'catalog:position-create' %}" class="btn btn-primary">
      Create Position
    </a>
  </div>

  <form method="get" class="form-inline mb-3">
    <input type="text" name="name" value="{{ request.GET.name }}"
           class="form-control mr-2" placeholder="Search by position name">
    <button type="submit" class="btn btn-primary">Search</button>
  </form>

  {% if position_list %}
    <ul class="list-group">
      {% for position in position_list %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <a href="{% url 'catalog:position-detail' pk=position.pk %}">
            {{ position.name }}
          </a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <div class="alert alert-info">No positions found.</div>
  {% endif %}
{% endblock %}
