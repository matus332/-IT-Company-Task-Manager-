{% extends "base.html" %}

{% block content %}
  <h1>Positions</h1>

  {% if position_list %}
    <ul>
      {% for position in position_list %}
        <li><a href="{% url 'catalog:position-detail' pk=position.pk %}">ID:{{ position.id }} "{{ position.name }}"</a></li>
      {% endfor %}
    </ul>
   {% else %}
    <div class="alert alert-info">
      No positions found.
    </div>
  {% endif %}
{% endblock %}
